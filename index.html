<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OLLTC - Our Lady of Lourdes Technological College</title>
    <script type="module" crossorigin src="./assets/index-CQJnikpn.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-7rjqWCFv.css">
  <style>
    #scroll-progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #1E40AF, #3B82F6);
      z-index: 9999;
      transition: width 0.08s linear;
      border-radius: 0 2px 2px 0;
    }
  </style>
  </head>
  <body>
    <div id="scroll-progress-bar"></div>
    <header style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:100;position:sticky;top:0;">
      <img src="./images/icon.png" alt="Site icon" style="width:40px;height:40px;object-fit:contain;" />
      <h1 style="margin:0;font-size:1.1rem;font-family:Arial, sans-serif;color:#1f2937;">OLLTC</h1>
    </header>
    <div id="root"></div>
    <script>
      (function () {
        const bar = document.getElementById('scroll-progress-bar');
        function updateProgress() {
          const scrollTop = window.scrollY || document.documentElement.scrollTop;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
          bar.style.width = progress + '%';
        }
        window.addEventListener('scroll', updateProgress, { passive: true });
        updateProgress();
      })();
    </script>
  </body>
</html>
